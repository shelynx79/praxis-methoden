<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Handouts · Praxis Florentine Flach</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&display=swap" rel="stylesheet">

<style>
:root{
  /* Palette aus dem Logo */
  --terracotta: #B08264;
  --terracotta-soft: #D9C4B4;
  --terracotta-wash: #F1E7DE;
  --blue: #5B7F97;
  --blue-soft: #B8C6D1;
  --blue-wash: #E3EAEE;
  --taupe: #BFB8B1;
  --paper: #FAF7F3;
  --paper-warm: #F4EEE6;
  --ink: #2E2A26;
  --ink-soft: #5B5550;
  --line: #E5DED4;
  --line-strong: #CDC3B7;
}


*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#E8E2D8;font-family:'Inter',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
body{padding:40px 20px 120px;}

.toolbar{
  position:fixed; left:50%; top:16px; transform:translateX(-50%);
  display:flex; gap:8px; align-items:center;
  background:#fff; border:1px solid var(--line);
  border-radius:999px; padding:6px; box-shadow:0 6px 24px rgba(46,42,38,.08);
  z-index:50; font-size:12px;
}
.toolbar button{
  border:0; background:transparent; padding:8px 14px; border-radius:999px;
  font:500 12px/1 'Inter',sans-serif; color:var(--ink-soft); cursor:pointer;
  letter-spacing:.02em;
}
.toolbar button.active{ background:var(--ink); color:#fff; }
.toolbar .sep{ width:1px; height:20px; background:var(--line); margin:0 4px;}
.toolbar .label{ padding:0 8px; color:var(--ink-soft); font-size:11px; letter-spacing:.12em; text-transform:uppercase;}

.stack{
  display:flex; flex-direction:column; align-items:center; gap:40px;
  margin-top:56px;
}

/* A4: 210 × 297 mm. Wir rendern in px @ 96dpi -> 794 × 1123. Skalieren via transform. */
.page-wrap{
  width: min(794px, 92vw);
  aspect-ratio: 794 / 1123;
  position:relative;
}
.page{
  position:absolute; top:0; left:0;
  width:794px; height:1123px;
  transform-origin: top left;
  background:var(--paper);
  box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 18px 50px -20px rgba(46,42,38,.25), 0 2px 10px -4px rgba(46,42,38,.12);
  overflow:hidden;
}
.page-scale-host{ --scale:1; }

.page-label{
  position:absolute; left:0; top:-28px;
  font:500 11px/1 'Inter',sans-serif;
  letter-spacing:.18em; text-transform:uppercase;
  color:var(--ink-soft);
}
.page-label b{color:var(--ink); font-weight:600}

/* Gemeinsame Typo */
.serif{ font-family:'Cormorant Garamond',serif; font-weight:500; }
.caps{ letter-spacing:.22em; text-transform:uppercase; }
.tiny{ font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-soft); }

/* ============== VARIANT A — Klassisch Editorial ============== */
.v-a{ padding: 54px 62px 56px; }
.v-a .head{
  display:flex; align-items:flex-end; justify-content:space-between;
  padding-bottom:18px; border-bottom:1px solid var(--line);
}
.v-a .brand{ display:flex; align-items:center; gap:14px;}
.v-a .brand img{ width:44px; height:44px; border-radius:50%;}
.v-a .brand .t1{ font:500 10px/1.2 'Inter',sans-serif; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-soft);}
.v-a .brand .t2{ font:500 18px/1 'Cormorant Garamond',serif; color:var(--ink); margin-top:4px; letter-spacing:.01em;}
.v-a .head .meta{ text-align:right; }
.v-a .head .meta .tiny{ display:block; margin-bottom:4px; }
.v-a .head .meta .num{ font:500 22px/1 'Cormorant Garamond',serif; color:var(--terracotta); letter-spacing:.04em; }

.v-a .title-block{ margin-top:44px; margin-bottom:28px;}
.v-a .eyebrow{ font:500 11px/1 'Inter',sans-serif; letter-spacing:.28em; text-transform:uppercase; color:var(--terracotta); margin-bottom:14px;}
.v-a h1{ font:500 42px/1.1 'Cormorant Garamond',serif; margin:0; letter-spacing:-.005em;}
.v-a h1 em{ font-style:italic; color:var(--blue); font-weight:400;}
.v-a .lede{ font:400 14.5px/1.6 'Inter',sans-serif; color:var(--ink-soft); max-width:560px; margin-top:14px;}

.v-a h2{
  font:500 13px/1 'Inter',sans-serif; letter-spacing:.22em; text-transform:uppercase;
  color:var(--ink); margin:26px 0 14px; display:flex; align-items:center; gap:10px;
}
.v-a h2::before{ content:""; width:22px; height:1px; background:var(--terracotta);}

/* Tagesprotokoll – Tabelle */
.protokoll{
  width:100%; border-collapse:collapse; margin-top:6px;
  font:400 11.5px/1.3 'Inter',sans-serif;
}
.protokoll th{
  text-align:left; font:500 9.5px/1.2 'Inter',sans-serif;
  letter-spacing:.2em; text-transform:uppercase; color:var(--ink-soft);
  padding:10px 8px; border-bottom:1px solid var(--line-strong); vertical-align:bottom;
}
.protokoll td{
  padding:0; border-bottom:1px solid var(--line);
  height:34px;
  color:var(--ink-soft);
}
.protokoll .time{
  width:70px; padding:8px 8px; color:var(--blue); font:500 11px/1.2 'Inter',sans-serif;
  letter-spacing:.02em; border-right:1px solid var(--line);
}
.protokoll .col-situation{ width:34%; border-right:1px dotted var(--line);}
.protokoll .col-gefuehl  { width:22%; border-right:1px dotted var(--line);}
.protokoll .col-gedanke  { width:26%; border-right:1px dotted var(--line);}
.protokoll .col-koerper  { width:18%; }

.skala{
  display:flex; align-items:center; gap:8px; margin-top:18px;
  font:400 11px/1.4 'Inter',sans-serif; color:var(--ink-soft);
}
.skala .pills{ display:flex; gap:4px;}
.skala .pill{
  width:22px; height:22px; border:1px solid var(--line-strong); border-radius:50%;
  display:inline-flex; align-items:center; justify-content:center;
  font:500 10px/1 'Inter',sans-serif; color:var(--ink-soft);
}

.v-a .foot{
  position:absolute; left:62px; right:62px; bottom:34px;
  display:flex; justify-content:space-between; align-items:center;
  padding-top:14px; border-top:1px solid var(--line);
  font:400 10px/1 'Inter',sans-serif; color:var(--ink-soft); letter-spacing:.12em; text-transform:uppercase;
}
.v-a .foot b{ color:var(--ink); font-weight:500;}

/* Anteile – A */
.v-a .a-grid{
  display:grid; grid-template-columns: 1fr 1fr; gap:18px; margin-top:8px;
}
.anteil-card{
  border:1px solid var(--line); padding:18px 20px 20px; background:#fff;
  position:relative;
}
.anteil-card .num{
  position:absolute; top:14px; right:16px;
  font:400 34px/1 'Cormorant Garamond',serif; color:var(--terracotta-soft);
}
.anteil-card h3{ font:500 16px/1.2 'Cormorant Garamond',serif; margin:0 0 12px; color:var(--ink);}
.anteil-card .field{ margin-bottom:10px;}
.anteil-card .field .lbl{ font:500 9.5px/1 'Inter',sans-serif; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:6px;}
.anteil-card .line{ height:12px; border-bottom:1px solid var(--line); margin-bottom:6px;}
.anteil-card .line:last-child{ margin-bottom:0;}

.impuls{
  margin-top:18px; padding:18px 20px; background:var(--paper-warm);
  border-left:2px solid var(--terracotta);
}
.impuls .tiny{ margin-bottom:8px; color:var(--terracotta);}
.impuls p{ margin:0; font:italic 400 14px/1.55 'Cormorant Garamond',serif; color:var(--ink);}

/* ============== VARIANT B — Ruhig Modern ============== */
.v-b{ padding: 60px 64px 72px; background:var(--paper);}
.v-b::before{
  content:""; position:absolute; top:0; right:0; width:180px; height:180px;
  background: radial-gradient(circle at 100% 0%, var(--blue-wash) 0%, transparent 65%);
  pointer-events:none;
}
.v-b .head{
  display:grid; grid-template-columns: auto 1fr auto; gap:20px; align-items:center;
}
.v-b .brand-mark{ width:36px; height:36px; border-radius:50%;}
.v-b .brand-name{
  font:500 10px/1 'Inter',sans-serif; letter-spacing:.24em; text-transform:uppercase; color:var(--ink-soft);
}
.v-b .brand-name b{ display:block; font:500 14px/1.2 'Cormorant Garamond',serif; color:var(--ink); letter-spacing:.02em; text-transform:none; margin-top:4px;}
.v-b .page-no{ font:500 11px/1 'Inter',sans-serif; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-soft);}
.v-b .page-no b{color:var(--terracotta); font-weight:600;}

.v-b .title-row{ margin-top:78px; display:grid; grid-template-columns: 1fr auto; align-items:end; gap:40px;}
.v-b h1{ font:400 56px/1.02 'Fraunces',serif; margin:0; letter-spacing:-.015em;}
.v-b h1 .accent{ color:var(--terracotta); font-style:italic; font-weight:300;}
.v-b .meta-col{ text-align:right; font:400 11px/1.5 'Inter',sans-serif; color:var(--ink-soft);}
.v-b .meta-col b{ color:var(--ink); font-weight:500;}
.v-b .hr{ height:1px; background:var(--ink); margin:28px 0 28px; width:38px;}
.v-b .lede{ max-width:560px; font:400 14px/1.65 'Inter',sans-serif; color:var(--ink-soft);}

.v-b h2{
  font:500 10.5px/1 'Inter',sans-serif; letter-spacing:.28em; text-transform:uppercase;
  color:var(--ink); margin:36px 0 14px;
}

/* Tagesprotokoll – B (Liste) */
.log-list{ border-top:1px solid var(--line);}
.log-row{
  display:grid; grid-template-columns: 64px 1fr 1fr 1fr 56px;
  border-bottom:1px solid var(--line);
  align-items:stretch;
}
.log-row.header{ border-bottom:1px solid var(--line-strong); padding:8px 0;}
.log-row.header > div{ font:500 9.5px/1 'Inter',sans-serif; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-soft); padding:4px 10px;}
.log-row > div{ padding:14px 10px; border-right:1px dotted var(--line); min-height:38px;}
.log-row > div:last-child{ border-right:0;}
.log-row .t{ font:500 12px/1.2 'Inter',sans-serif; color:var(--blue); letter-spacing:.04em;}
.log-row .intensity{ color:var(--terracotta); font:500 12px/1.2 'Inter',sans-serif;}

.legend{
  display:grid; grid-template-columns: 1fr 1fr; gap:22px; margin-top:20px;
  font:400 11px/1.55 'Inter',sans-serif; color:var(--ink-soft);
}
.legend b{ display:block; font:500 10px/1.2 'Inter',sans-serif; letter-spacing:.2em; text-transform:uppercase; color:var(--ink); margin-bottom:6px;}

.v-b .foot{
  position:absolute; left:64px; right:64px; bottom:36px;
  display:flex; justify-content:space-between; align-items:center;
  font:400 10px/1 'Inter',sans-serif; color:var(--ink-soft); letter-spacing:.14em; text-transform:uppercase;
}
.v-b .foot .spiral{ width:14px; height:14px; opacity:.7;}

/* Anteile – B */
.v-b .a-grid{ display:grid; grid-template-columns: 1fr 1fr 1fr; gap:14px; margin-top:6px;}
.parts-card{
  padding:20px 18px; background:#fff; border:1px solid var(--line); position:relative;
}
.parts-card .dot{
  width:24px; height:24px; border-radius:50%; margin-bottom:16px;
  background:var(--terracotta-soft);
}
.parts-card:nth-child(2) .dot{ background:var(--blue-soft);}
.parts-card:nth-child(3) .dot{ background:var(--taupe);}
.parts-card h3{ font:500 14px/1.2 'Fraunces',serif; margin:0 0 10px;}
.parts-card .field{ margin-bottom:12px;}
.parts-card .lbl{ font:500 9px/1 'Inter',sans-serif; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:6px;}
.parts-card .line{ height:11px; border-bottom:1px solid var(--line); margin-bottom:5px;}

.reflexion{
  margin-top:22px; padding:22px 24px;
  border:1px solid var(--line); background:linear-gradient(180deg,#fff, var(--paper));
}
.reflexion .tiny{ color:var(--blue);}
.reflexion .q{ font:italic 400 17px/1.45 'Fraunces',serif; margin:10px 0 14px; color:var(--ink);}
.reflexion .ans{ display:flex; flex-direction:column; gap:8px;}
.reflexion .ans .ln{ height:11px; border-bottom:1px solid var(--line);}

/* ============== VARIANT C — Warm Organisch ============== */
.v-c{ padding: 56px 60px 72px; background:var(--paper-warm);}
.v-c::before{
  content:""; position:absolute; top:-120px; right:-120px; width:320px; height:320px; border-radius:50%;
  background: radial-gradient(circle, var(--terracotta-wash) 0%, transparent 68%);
  pointer-events:none;
}
.v-c::after{
  content:""; position:absolute; bottom:-140px; left:-140px; width:360px; height:360px; border-radius:50%;
  background: radial-gradient(circle, var(--blue-wash) 0%, transparent 65%);
  pointer-events:none;
}
.v-c .head{
  display:flex; justify-content:space-between; align-items:center;
}
.v-c .brand{ display:flex; align-items:center; gap:12px;}
.v-c .brand img{ width:40px; height:40px; border-radius:50%;}
.v-c .brand .t1{ font:500 9.5px/1 'Inter',sans-serif; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-soft);}
.v-c .brand .t2{ font:500 16px/1 'Cormorant Garamond',serif; margin-top:4px;}
.v-c .chip{
  padding:6px 14px; border:1px solid var(--line-strong); border-radius:999px; background:#fff;
  font:500 10px/1 'Inter',sans-serif; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-soft);
}

.v-c .title-block{ text-align:center; margin:56px auto 28px; max-width:520px; position:relative; z-index:2;}
.v-c .eyebrow{ font:500 10.5px/1 'Inter',sans-serif; letter-spacing:.3em; text-transform:uppercase; color:var(--terracotta); margin-bottom:18px;}
.v-c h1{ font:500 44px/1.1 'Cormorant Garamond',serif; margin:0; letter-spacing:-.005em;}
.v-c h1 em{ font-style:italic; color:var(--blue); font-weight:400;}
.v-c .lede{ font:400 13.5px/1.7 'Inter',sans-serif; color:var(--ink-soft); margin-top:16px;}

.v-c .orn{ display:flex; justify-content:center; gap:6px; margin:22px 0 26px;}
.v-c .orn span{ width:4px; height:4px; border-radius:50%; background:var(--taupe);}
.v-c .orn span:nth-child(2){ background:var(--terracotta);}
.v-c .orn span:nth-child(3){ background:var(--blue);}

.v-c h2{
  font:500 11px/1 'Inter',sans-serif; letter-spacing:.28em; text-transform:uppercase;
  color:var(--ink); margin:22px 0 14px; text-align:center;
}

/* Tagesprotokoll – C (Karten pro Zeitpunkt) */
.time-cards{ display:flex; flex-direction:column; gap:10px; position:relative; z-index:2;}
.time-card{
  display:grid; grid-template-columns: 80px 1fr; background:#fff; border-radius:14px;
  border:1px solid var(--line); overflow:hidden;
}
.time-card .time{
  background: var(--paper-warm); padding:14px 12px;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  border-right:1px solid var(--line);
}
.time-card .time .hr{ font:500 18px/1 'Cormorant Garamond',serif; color:var(--ink);}
.time-card .time .lbl{ font:500 8.5px/1 'Inter',sans-serif; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-soft); margin-top:6px;}
.time-card .grid{
  display:grid; grid-template-columns: 1.6fr 1fr 1fr; padding:10px 14px; gap:0;
}
.time-card .grid > div{ padding:4px 10px; border-right:1px dotted var(--line);}
.time-card .grid > div:last-child{ border-right:0;}
.time-card .grid .lbl{ font:500 8.5px/1 'Inter',sans-serif; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:8px;}
.time-card .grid .ln{ height:10px; border-bottom:1px solid var(--line); margin-bottom:5px;}

/* Anteile – C */
.v-c .a-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:6px; position:relative; z-index:2;}
.leaf-card{
  background:#fff; border-radius:16px; padding:22px 22px 20px;
  border:1px solid var(--line); position:relative;
}
.leaf-card .leaf{
  position:absolute; top:18px; right:18px; width:28px; height:28px; border-radius:50%;
  background:var(--terracotta-soft);
}
.leaf-card:nth-child(2) .leaf{ background:var(--blue-soft);}
.leaf-card:nth-child(3) .leaf{ background:var(--taupe);}
.leaf-card:nth-child(4) .leaf{ background:var(--terracotta-wash); border:1px solid var(--terracotta-soft);}
.leaf-card h3{ font:500 17px/1.15 'Cormorant Garamond',serif; margin:0 0 4px;}
.leaf-card .sub{ font:italic 400 12px/1.3 'Cormorant Garamond',serif; color:var(--ink-soft); margin-bottom:14px;}
.leaf-card .f{ margin-bottom:10px;}
.leaf-card .lbl{ font:500 9px/1 'Inter',sans-serif; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:6px;}
.leaf-card .ln{ height:11px; border-bottom:1px solid var(--line); margin-bottom:5px;}

.invite{
  margin-top:22px; padding:22px 28px; text-align:center; position:relative; z-index:2;
  border-top:1px solid var(--line-strong); border-bottom:1px solid var(--line-strong);
}
.invite .q{ font:italic 400 17px/1.5 'Cormorant Garamond',serif; color:var(--ink); max-width:500px; margin:0 auto;}
.invite .q::before, .invite .q::after{ color:var(--terracotta); padding:0 6px;}
.invite .q::before{ content:"„"; } .invite .q::after{ content:"“"; }

.v-c .foot{
  position:absolute; left:60px; right:60px; bottom:34px;
  display:flex; justify-content:space-between; align-items:center;
  font:400 10px/1 'Inter',sans-serif; color:var(--ink-soft); letter-spacing:.14em; text-transform:uppercase;
  z-index:3;
}

/* ============== PANIK — gemeinsam ============== */
.panik-intro{
  display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin-top:6px;
}
.panik-intro .box{
  padding:12px 14px; border:1px solid var(--line); background:#fff;
}
.panik-intro .box h4{
  font:500 10px/1 'Inter',sans-serif; letter-spacing:.22em; text-transform:uppercase;
  color:var(--terracotta); margin:0 0 8px;
}
.panik-intro .box p{ margin:0; font:400 11px/1.5 'Inter',sans-serif; color:var(--ink-soft);}
.panik-intro .box.blue h4{ color:var(--blue);}

.myths{ display:flex; flex-direction:column; gap:0;}
.myth{
  display:grid; grid-template-columns: 90px 1fr; gap:12px;
  padding:7px 12px; border-bottom:1px dotted var(--line);
  font:400 11px/1.45 'Inter',sans-serif; color:var(--ink-soft);
}
.myth .tag{
  font:500 9px/1.2 'Inter',sans-serif; letter-spacing:.2em; text-transform:uppercase;
}
.myth .tag.m{ color:var(--terracotta);}
.myth .tag.f{ color:var(--blue);}
.myth b{ color:var(--ink); font-weight:500;}

.symptom-grid{
  display:grid; grid-template-columns: repeat(4, 1fr); gap:6px; margin-top:4px;
}
.symptom{
  padding:8px 10px; border:1px solid var(--line); background:#fff;
  font:400 10.5px/1.35 'Inter',sans-serif; color:var(--ink-soft);
}
.symptom b{ display:block; font:500 9.5px/1.1 'Inter',sans-serif; letter-spacing:.16em; text-transform:uppercase; color:var(--ink); margin-bottom:3px;}

.cycle{
  display:grid; grid-template-columns: repeat(4, 1fr); gap:8px; margin-top:2px;
  position:relative;
}
.cycle .step{
  padding:10px 12px; border:1px solid var(--line); background:#fff; position:relative;
}
.cycle .step .n{
  font:500 9.5px/1 'Inter',sans-serif; letter-spacing:.2em; text-transform:uppercase;
  color:var(--terracotta); margin-bottom:5px;
}
.cycle .step h5{ font:500 13px/1.2 'Cormorant Garamond',serif; margin:0 0 4px; color:var(--ink);}
.cycle .step p{ margin:0; font:400 10.5px/1.45 'Inter',sans-serif; color:var(--ink-soft);}
.cycle .arrow{
  position:absolute; right:-6px; top:50%; width:9px; height:9px;
  border-top:1px solid var(--line-strong); border-right:1px solid var(--line-strong);
  transform: translateY(-50%) rotate(45deg);
}

.breath{
  display:grid; grid-template-columns: 130px 1fr; gap:16px; align-items:center;
  padding:12px 16px; background:var(--paper-warm); border:1px solid var(--line);
}
.breath .viz{
  position:relative; aspect-ratio:1; border-radius:50%;
  border:1px solid var(--blue-soft);
  display:flex; align-items:center; justify-content:center;
}
.breath .viz::before{
  content:""; position:absolute; inset:10px; border-radius:50%;
  border:1px dashed var(--line-strong);
}
.breath .viz .num{
  font:500 28px/1 'Cormorant Garamond',serif; color:var(--blue); text-align:center;
}
.breath .viz .num em{ font-style:italic; font-size:12px; color:var(--ink-soft); display:block; text-align:center; margin-top:4px;}
.breath .steps{ display:flex; flex-direction:column; gap:6px;}
.breath .steps .s{
  display:grid; grid-template-columns: 40px 1fr; gap:8px; align-items:baseline;
}
.breath .steps .s .n{
  font:500 16px/1 'Cormorant Garamond',serif; color:var(--terracotta);
}

      <h1>Panikattacken <em>verstehen</em></h1>
      <p class="lede">Eine Panikattacke fühlt sich bedrohlich an — sie ist es jedoch nicht. Sie ist ein überaktivierter Alarm des Körpers, der innerhalb weniger Minuten ihren Höhepunkt erreicht und von selbst wieder abklingt. Dieses Blatt hilft, das Geschehen einzuordnen und im Moment wieder handlungsfähig zu werden.</p>

    <div class="panik-intro">

      </div>
      <div class="box blue">
        <h4>Die Entwarnung</h4>
        <p>Nach ca. 3—10 Minuten setzen körpereigene Gegenregulationen ein. Der Körper kann Panik nicht dauerhaft aufrechterhalten — eine Attacke klingt verlässlich wieder ab. Diese Erfahrung zu wiederholen ist der wichtigste Lernschritt.</p>
      </div>
    </div>
    
    <h2>Typische Symptome</h2>
    <div class="symptom-grid">
      <div class="symptom"><b>Herz</b>Rasen, Stolpern, Pochen im Hals</div>
      <div class="symptom"><b>Atmung</b>Kurz, flach, Gefühl zu ersticken</div>
      <div class="symptom"><b>Körper</b>Zittern, Schwitzen, Taubheit</div>
      <div class="symptom"><b>Wahrnehmung</b>Schwindel, Entfremdung, Nebel</div>
      <div class="symptom"><b>Denken</b>„Ich sterbe / werde verrückt“</div>
      <div class="symptom"><b>Magen</b>Übelkeit, Druck, Enge</div>
      <div class="symptom"><b>Kontrolle</b>Angst, die Kontrolle zu verlieren</div>
      <div class="symptom"><b>Impuls</b>Drang zu fliehen</div>
    </div>
    
    <h2>Der Teufelskreis der Angst</h2>
    <div class="cycle">
      <div class="step"><div class="n">01</div><h5>Auslöser</h5><p>Körperempfindung, Gedanke oder Situation.</p><div class="arrow"></div></div>

        <div class="s"><div class="n">7</div><div class="t"><b>Halten</b> — sieben Sekunden den Atem sanft halten, Schultern lockerlassen.</div></div>
        <div class="s"><div class="n">8</div><div class="t"><b>Ausatmen</b> durch den leicht geöffneten Mund — acht Sekunden, langsam und lang.</div></div>

      <div class="myth"><div class="tag f">Fakt</div><div><b>Panik ist eine Stressreaktion</b>, keine Psychose. Kontrolle bleibt erhalten, auch wenn es sich anders anfühlt.</div></div>

<script>
const stack = document.getElementById('stack');
const tpls = {
  a: { tag: 'tpl-a-tag', anteile: 'tpl-a-anteile', panik: 'tpl-a-panik', neuro: 'tpl-a-neuro' },
  b: { tag: 'tpl-b-tag', anteile: 'tpl-b-anteile', panik: 'tpl-b-panik', neuro: 'tpl-b-neuro' },
  c: { tag: 'tpl-c-tag', anteile: 'tpl-c-anteile', panik: 'tpl-c-panik', neuro: 'tpl-c-neuro' },
};
const labels = {
  a: 'Variante A · Klassisch Editorial',
  b: 'Variante B · Ruhig Modern',
  c: 'Variante C · Warm Organisch',
  tag: 'Tagesprotokoll',
  anteile: 'Anteile benennen & beschreiben',
  panik: 'Panikattacken verstehen',
  neuro: 'Neurodivergenz · Selbsteinordnung',
};


let current = { v: 'a', h: 'all' };

function mountPage(v, h){
  const wrap = document.createElement('div');
  wrap.className = 'page-wrap';
  wrap.setAttribute('data-screen-label', `${v.toUpperCase()} · ${h}`);

  const lab = document.createElement('div');
  lab.className = 'page-label';
  lab.innerHTML = `<b>${labels[v]}</b> &nbsp;·&nbsp; ${labels[h]}`;
  wrap.appendChild(lab);

  const tpl = document.getElementById(tpls[v][h]);
  const node = tpl.content.firstElementChild.cloneNode(true);
  wrap.appendChild(node);
  stack.appendChild(wrap);
  return { wrap, node };
}

function render(){
  stack.innerHTML = '';
  const variants = [current.v];
  const handouts = current.h === 'all' ? ['tag','anteile','panik','neuro'] : [current.h];
  for (const v of variants){
    for (const h of handouts){
      mountPage(v, h);
    }
  }
  requestAnimationFrame(scaleAll);
}

function scaleAll(){
  document.querySelectorAll('.page-wrap').forEach(wrap=>{
    const page = wrap.querySelector('.page');
    if(!page) return;
    const wrapW = wrap.getBoundingClientRect().width;
    const scale = wrapW / 794;
    page.style.transform = `scale(${scale})`;
    wrap.style.height = (1123 * scale) + 'px';
    wrap.style.aspectRatio = 'auto';
  });
}

window.addEventListener('resize', scaleAll);

document.getElementById('toolbar').addEventListener('click', e=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  if (btn.dataset.v){
    current.v = btn.dataset.v;
    document.querySelectorAll('#toolbar button[data-v]').forEach(b=>b.classList.toggle('active', b===btn));
  }
  if (btn.dataset.h){
    current.h = btn.dataset.h;
    document.querySelectorAll('#toolbar button[data-h]').forEach(b=>b.classList.toggle('active', b===btn));
  }
  render();
});

render();
</script>
