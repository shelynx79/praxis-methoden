<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @font-face {
    font-family: 'Cormorant Garamond';
    font-style: italic;
    font-weight: 400;
    font-display: swap;
    src: url('https://shelynx79.github.io/praxis-methoden/fonts/cormorant-garamond-v21-latin-italic.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Roboto';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('https://shelynx79.github.io/praxis-methoden/fonts/roboto-v51-latin-regular.woff2') format('woff2');
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; }
  body {
    font-family: 'Roboto', sans-serif;
    padding: 8px 0 0 0;
  }

  .zitat-block {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    gap: 24px;
    align-items: stretch;
    padding: 0 24px;
  }

  .zitat-linie {
    width: 3px;
    background: linear-gradient(to bottom, #B08860, #D4B08A);
    flex-shrink: 0;
    border-radius: 2px;
  }

  .zitat-inhalt {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 4px 0;
  }

  .zitat-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-style: italic;
    font-weight: 400;
    color: #2A2A24;
    line-height: 1.75;
  }

  .zitat-autor {
    font-size: 0.75rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #B08860;
  }
</style>
</head>
<body>
<div class="zitat-block">
  <div class="zitat-linie"></div>
  <div class="zitat-inhalt">
    <p class="zitat-text">Leben ist das, was uns zustößt, während wir uns etwas ganz anderes vorgenommen haben.</p>
    <span class="zitat-autor">Henry Miller</span>
  </div>
</div>
<script>
  function sendHeight() {
    var el = document.querySelector('.zitat-block');
    var h = el ? el.getBoundingClientRect().bottom : document.body.scrollHeight;
    window.parent.postMessage({ iframeHeight: Math.ceil(h) }, '*');
  }
  window.addEventListener('load', function() { setTimeout(sendHeight, 100); });
  window.addEventListener('resize', sendHeight);
</script>
</body>
</html>
